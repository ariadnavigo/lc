name: C/C++ CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-26.04
    steps:
      - name: Install scdoc
        run: |
          sudo apt-get update
          sudo apt-get install -y scdoc

      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Compile
        run: make
