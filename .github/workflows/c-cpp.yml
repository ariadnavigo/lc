name: C/C++ CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-26.04

    steps:
      - name: Install scdoc
        run: |
          sudo apt-get update
          sudo apt-get install -y scdoc
      - uses: actions/checkout@v4
      - name: make
        run: make
